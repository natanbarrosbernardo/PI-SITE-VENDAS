<!doctype html>
<html lang="pt" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Spring-Boot</title>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <link rel="icon" href="/image/favicon.png" />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <!-- Custom styles for this template -->
    <link href="/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-inverse navbar navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
          <div class="navbar-header">
            <button type="button" class="btn btn-dark navbar-toggle pull-left">
              <i class="bi bi-list"></i>
            </button>
            <a class="navbar-brand navbar-toggle pull-left" href="#"
              >Curso Spring Boot</a
            >
          </div>
        </div>
      </nav>
    </header>

    <div class="layout-main">
      <aside>
        <nav class="sidebar sidebar-open">
          <ul class="nav nav-pills">
            <li class="nav-item">
              <a class="nav-link" href="/">
                <i class="bi bi-house"></i> <span>Home</span>
              </a>
            </li>
          </ul>

          <ul class="nav nav-pills">
            <li class="nav-item">
              <span class="nav-link active">Departamentos</span>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/departamentos/cadastrar">
                <i class="bi bi-plus-lg"></i>
                <span>Cadastrar</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/departamentos/listar">
                <i class="bi bi-table"></i>
                <span>Listar </span>
              </a>
            </li>
          </ul>

          <ul class="nav nav-pills">
            <li class="nav-item">
              <span class="nav-link active">Cargos</span>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/cargos/cadastrar">
                <i class="bi bi-plus-lg"></i> <span>Cadastrar </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/cargos/listar">
                <i class="bi bi-table"></i> <span>Listar </span>
              </a>
            </li>
          </ul>

          <ul class="nav nav-pills">
            <li class="nav-item">
              <span class="nav-link active">Funcionários</span>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/funcionarios/cadastrar">
                <i class="bi bi-plus-lg"></i>
                <span>Cadastrar </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/funcionarios/listar">
                <i class="bi bi-table"></i>
                <span>Listar </span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <section class="layout-content">
        <nav class="navbar navbar-expand-md bg-light">
          <div class="collapse navbar-collapse" id="navbarsExampleDefault">
            <ul class="navbar-nav mr-auto">
              <li class="nav-item active">
                <i class="bi bi-caret-right-fill"></i>
                <span>Cadastrar Departamentos</span>
              </li>
            </ul>
            <a
              class="btn btn-primary btn-md ms-auto"
              href="/departamentos/listar"
              role="button"
            >
              <span
                class="bi bi-table"
                title="Listar"
                aria-hidden="true"
              ></span>
              <span>Listar Departamentos</span>
            </a>
          </div>
        </nav>

        <div class="container" id="cadastro">
          <form action="/departamentos/salvar" method="POST">
            <div class="form-row">
              <div class="form-group col-md-6">
                <label for="nome">Departamento</label>
                <input
                  type="text"
                  class="form-control"
                  id="nome"
                  placeholder="Nome Departamento"
                  autofocus="autofocus"
                  name="nome"
                  value=""
                />
              </div>
            </div>
            <input type="hidden" id="id" name="id" value="" />
            <button type="submit" class="btn btn-primary btn-sm mt-3">
              Salvar
            </button>
          </form>
        </div>
      </section>
    </div>

    <footer class="layout-footer">
      <div class="container">
        <span class="footer-copy">&copy; Todos os direitos reservados.</span>
      </div>
    </footer>

    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <!-- jQuery 3.7.1 -->
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <!-- jQuery Mask Plugin -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"
      integrity="sha512-pHVGpX7F/27yZ0ISY+VVjyULApbDlD0/X0rgGbTqCE7WFW5MezNTWG/dnhtbBuICzsd0WQPgpE4REBLv+UqChw=="
      crossorigin="anonymous"
    ></script>
    <!-- Bootstrap 5 Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="text/javascript">
      $(function () {
        $('[data-toggle="popover"]').popover();
      });

      $(document).ready(function () {
        $(".navbar-toggle").click(function () {
          $(".sidebar").toggleClass("sidebar-open");
        });
      });
    </script>
  </body>
</html>
